dataset:
  name: MANTRA-Synth100k
  version: v1
  total_images: 100000
  train_images: 80000
  val_images: 10000
  test_images: 10000
  random_seed: 42

paths:
  raw_text_dir: data/stage1_synthetic/text/raw
  cleaned_text_dir: data/stage1_synthetic/text/cleaned
  generated_text_dir: data/stage1_synthetic/text/generated
  font_dir: data/stage1_synthetic/fonts
  image_dir: data/stage1_synthetic/images
  label_dir: data/stage1_synthetic/labels
  metadata_dir: data/stage1_synthetic/metadata
  report_dir: data/stage1_synthetic/reports

composition:
  natural_text_lines: 70000
  coverage_lines: 15000
  sanskrit_danda_lines: 5000
  historical_admin_lines: 5000
  names_dates_numeral_lines: 5000

line_length_distribution:
  short:
    min_chars: 10
    max_chars: 25
    ratio: 0.10
  medium:
    min_chars: 26
    max_chars: 60
    ratio: 0.55
  long:
    min_chars: 61
    max_chars: 100
    ratio: 0.30
  very_long:
    min_chars: 101
    max_chars: 130
    ratio: 0.05

rendering:
  preferred_renderer: chromium
  fallback_renderer: chromium
  min_fonts: 10
  target_fonts: 20
  font_size_min: 28
  font_size_max: 52
  padding_min: 15
  padding_max: 35
  max_rotation: 1.5
  format: PNG

font_split:
  use_font_aware_split: true
  heldout_val_fonts: 2
  heldout_test_fonts: 2

source_split:
  use_source_aware_split: true
  heldout_val_sources_ratio: 0.10
  heldout_test_sources_ratio: 0.10

degradation_mode:
  single_profile_prob: 0.70
  composed_profile_prob: 0.30

degradation_distribution:
  D0_clean_print: 0.085
  D1_light_scan: 0.10
  D2_low_contrast_faded_ink: 0.08
  D3_uneven_background: 0.07
  D4_broken_strokes: 0.05
  D5_noisy_archive_scan: 0.05
  D6_blurred_scan: 0.05
  D7_old_paper_texture: 0.05
  D8_old_scan_soft: 0.07
  D9_faded_gray_ink: 0.06
  D10_noisy_scan_crop: 0.04
  D11_mild_warped_line: 0.03
  D12_dark_thick_scan: 0.03
  D13_washed_out_faint_manuscript: 0.025
  D14_low_dpi_compressed_scan: 0.035
  D15_bleedthrough_archival: 0.025
  D16_ink_bleed_spread: 0.025
  D17_local_stain_shadow: 0.025
  D18_fold_crease_damage: 0.02
  D19_weak_shirorekha_dropout: 0.015
  D20_partial_erosion_thin_strokes: 0.015
  D21_mixed_manuscript_hard: 0.02
  D22_reverse_showthrough_soft: 0.015
  D23_fragmented_scan_crop: 0.015

coverage_targets:
  basic_consonant_min_occurrences: 1000
  common_matra_min_occurrences: 5000
  common_conjunct_min_occurrences: 2000
  danda_min_occurrences: 10000
  double_danda_min_occurrences: 2000
  devanagari_digit_min_occurrences: 1000
  anusvara_min_occurrences: 5000
  chandrabindu_min_occurrences: 1000
  visarga_min_occurrences: 2000

important_conjuncts:
  - क्ष
  - त्र
  - ज्ञ
  - श्र
  - द्ध
  - द्व
  - द्य
  - ह्म
  - स्त्र
  - क्त्य
  - प्र
  - ब्र
  - भ्र
  - ग्र
  - क्र

quality_control:
  generate_sample_grids: true
  inspect_random_train_samples: 100
  inspect_random_val_samples: 50
  inspect_random_test_samples: 50
  inspect_rare_conjunct_samples: 100
  inspect_high_degradation_samples: 50
